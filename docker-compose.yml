# Stamp AI Service - app only (no nginx)
# Host port default: 18080  ->  container 8000
# Override in .env: HOST_PORT=18080

services:
  stamp-ai:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-mirrors.aliyun.com}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    container_name: stamp-ai-service
    restart: unless-stopped
    environment:
      # App info
      APP_NAME: ${APP_NAME:-Stamp AI Service}
      APP_VERSION: ${APP_VERSION:-0.6.0}
      # Ports
      APP_PORT: ${APP_PORT:-8000}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
      APP_RELOAD: "false"
      # Data directories
      DATA_ROOT: ${DATA_ROOT:-/app/data}
      # Upload limits
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-31457280}
      MAX_IMAGE_PIXELS: ${MAX_IMAGE_PIXELS:-60000000}
      # Allowed extensions
      ALLOWED_EXTENSIONS: ${ALLOWED_EXTENSIONS:-.jpg,.jpeg,.png,.bmp,.webp,.tif,.tiff}
      # Output URL prefix (生产必须配置为公网域名/IP)
      OUTPUT_URL_PREFIX: ${OUTPUT_URL_PREFIX:-http://127.0.0.1:18080/outputs}
      # Cleanup
      CLEANUP_ENABLED: ${CLEANUP_ENABLED:-true}
      CLEANUP_INTERVAL_SECONDS: ${CLEANUP_INTERVAL_SECONDS:-3600}
      CLEANUP_MAX_AGE_SECONDS: ${CLEANUP_MAX_AGE_SECONDS:-86400}
      # Logs
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-3}
      # Model
      U2NET_HOME: /app/data/models/u2net
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/outputs:/app/data/outputs
      - ./data/logs:/app/data/logs
      - ./data/temp:/app/data/temp
      # Persist rembg model (~176MB) so restart won't re-download
      - ./data/models:/app/data/models
    # Host default 18080 to avoid common 80/8000 conflicts
    ports:
      - "${HOST_PORT:-18080}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:${APP_PORT:-8000}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT:-2.0}"
          memory: ${MEM_LIMIT:-4G}
        reservations:
          cpus: "0.5"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
