services:
  stamp-ai:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-mirrors.aliyun.com}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    container_name: stamp-ai-service
    restart: unless-stopped
    environment:
      APP_PORT: ${APP_PORT:-8000}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
      APP_RELOAD: "false"
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-31457280}
      MAX_IMAGE_PIXELS: ${MAX_IMAGE_PIXELS:-60000000}
      CLEANUP_ENABLED: ${CLEANUP_ENABLED:-true}
      CLEANUP_INTERVAL_SECONDS: ${CLEANUP_INTERVAL_SECONDS:-3600}
      CLEANUP_MAX_AGE_SECONDS: ${CLEANUP_MAX_AGE_SECONDS:-86400}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-3}
      U2NET_HOME: /app/models/u2net
    volumes:
      - ./data/uploads:/app/uploads
      - ./data/outputs:/app/outputs
      - ./data/logs:/app/logs
      - ./data/temp:/app/temp
      # Persist rembg model (~176MB) so restart won't re-download
      - ./data/models/u2net:/app/models/u2net
    # Host default 18080 to avoid common 80/8000 conflicts
    ports:
      - "${HOST_PORT:-18080}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT:-2.0}"
          memory: ${MEM_LIMIT:-4G}
        reservations:
          cpus: "0.5"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
