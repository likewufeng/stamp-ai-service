services:
  stamp-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stamp-ai-service
    restart: unless-stopped
    environment:
      APP_PORT: ${APP_PORT:-8000}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
      APP_RELOAD: "false"
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-31457280}
      MAX_IMAGE_PIXELS: ${MAX_IMAGE_PIXELS:-60000000}
      CLEANUP_ENABLED: ${CLEANUP_ENABLED:-true}
      CLEANUP_INTERVAL_SECONDS: ${CLEANUP_INTERVAL_SECONDS:-3600}
      CLEANUP_MAX_AGE_SECONDS: ${CLEANUP_MAX_AGE_SECONDS:-86400}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-3}
      U2NET_HOME: /app/models/u2net
    volumes:
      - ./data/uploads:/app/uploads
      - ./data/outputs:/app/outputs
      - ./data/logs:/app/logs
      - ./data/temp:/app/temp
      # Persist rembg model (~176MB) so restart won't re-download
      - ./data/models/u2net:/app/models/u2net
    expose:
      - "8000"
    # Direct access (optional). Prefer nginx in production.
    ports:
      - "${HOST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    # Limit resources on shared servers (adjust as needed)
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT:-2.0}"
          memory: ${MEM_LIMIT:-4G}
        reservations:
          cpus: "0.5"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    networks:
      - stamp-net

  nginx:
    image: nginx:1.27-alpine
    container_name: stamp-ai-nginx
    restart: unless-stopped
    depends_on:
      stamp-ai:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      # Uncomment when TLS certs are ready:
      # - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/outputs:/var/www/outputs:ro
      # TLS (optional):
      # - ./deploy/certs:/etc/nginx/certs:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - stamp-net

networks:
  stamp-net:
    driver: bridge
