# Stamp AI Service - Nginx reverse proxy
# Upstream FastAPI / uvicorn

upstream stamp_ai_upstream {
    server stamp-ai:8000;
    keepalive 16;
}

# Optional HTTPS — enable after placing certs under deploy/certs/
# server {
#     listen 443 ssl http2;
#     server_name your.domain.com;
#
#     ssl_certificate     /etc/nginx/certs/fullchain.pem;
#     ssl_certificate_key /etc/nginx/certs/privkey.pem;
#     ssl_protocols       TLSv1.2 TLSv1.3;
#
#     # ... same location blocks as below ...
# }

server {
    listen 80;
    server_name _;

    client_max_body_size 35m;
    client_body_timeout 120s;

    # Security headers (basic)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Gzip JSON / text
    gzip on;
    gzip_types application/json text/plain application/javascript text/css;
    gzip_min_length 1024;

    # Health (no access log noise)
    location = /api/health {
        proxy_pass http://stamp_ai_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Static outputs — served by nginx directly (faster than FastAPI StaticFiles)
    location /outputs/ {
        alias /var/www/outputs/;
        expires 1h;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # API + docs + app
    location / {
        proxy_pass http://stamp_ai_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Vision jobs can be slow (rembg cold start / large images)
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Avoid buffering large base64 JSON in memory unnecessarily
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;
    }
}
